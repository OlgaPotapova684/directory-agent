name: Bug report
description: Something does not work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include steps to reproduce and your environment (OS, Node version).
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. npm start\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 12, Node 22, 8 GB RAM"
    validations:
      required: false
